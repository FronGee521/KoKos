<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Russo+One&display=swap" rel="stylesheet">
  <title>KoKos — Кулинарная книга</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f5faf8 0%, #e0ece6 100%);
      color: #1a2e28;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      padding-bottom: 120px;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }
    
    body.dark {
      background: linear-gradient(135deg, #0a1a14 0%, #121e1a 50%, #1a2e28 100%);
      color: #d4e6df;
    }
    
    body.dark .card, body.dark .dialog-content, body.dark .main-menu,
    body.dark .dropdown-menu, body.dark .cat-item, body.dark .settings-content {
      background: rgba(30, 47, 41, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    body.dark input, body.dark textarea, body.dark select {
      background: rgba(42, 64, 56, 0.7);
      color: #d4e6df;
      border-color: rgba(255, 255, 255, 0.1);
    }
    
    .app { max-width: 480px; margin: 0 auto; padding: 12px 16px; }
    
    h1 { font-family: 'Russo One', sans-serif; color: #1a9170; font-size: 28px; }
    h2 { font-size: 20px; color: #1a9170; margin-bottom: 16px; }
    h3 { font-size: 16px; margin: 12px 0 8px; color: #1a4d3d; }
    
    .brand { font-family: 'Russo One', sans-serif; color: #1a9170; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    
    @keyframes glassAppear {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeSlideUp 0.5s ease-out;
    }
    
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
    }
    
    .card-title { font-weight: 700; font-size: 16px; }
    .card-sub { color: #5a7a6e; font-size: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .card img { 
      width: 100%; max-height: 180px; object-fit: cover; border-radius: 16px; 
      margin: 10px 0; background: rgba(220, 232, 226, 0.5);
    }

    .chip {
      background: rgba(232, 243, 239, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 4px 14px; border-radius: 30px;
      font-size: 11px; font-weight: 600; color: #1a4d3d;
      display: inline-block; border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.3s ease;
    }
    .chip:hover {
      transform: scale(1.05);
      background: rgba(26, 145, 112, 0.15);
    }
    body.dark .chip { 
      background: rgba(45, 74, 64, 0.7);
      color: #b8d5c9;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .star { 
      color: #b0ccc0; 
      font-size: 24px; 
      cursor: pointer; 
      user-select: none;
      transition: all 0.3s ease;
    }
    .star.active { 
      color: #f5b342;
      animation: pulse 0.3s ease;
    }
    .star:hover { transform: scale(1.2); }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .top-bar-left { display: flex; align-items: center; gap: 8px; }
    .top-bar-right { display: flex; align-items: center; gap: 4px; }
    
    .top-btn {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      color: #1a9170;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-btn:hover { 
      transform: scale(1.1) rotate(10deg);
      background: rgba(26, 145, 112, 0.15);
    }
    body.dark .top-btn {
      background: rgba(30, 47, 41, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #7ab8a0;
    }

    .menu-wrapper { position: relative; display: inline-block; }
    .dropdown-menu {
      position: absolute; right: 0; top: 50px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      padding: 8px 0; min-width: 210px;
      display: none; z-index: 50;
      animation: glassAppear 0.3s ease;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu button {
      background: none; border: none; padding: 12px 20px;
      width: 100%; text-align: left; font-size: 13px;
      font-weight: 500; color: #1a2e28;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 8px;
    }
    .dropdown-menu button:hover { 
      background: rgba(26, 145, 112, 0.1);
      padding-left: 24px;
    }
    body.dark .dropdown-menu {
      background: rgba(30, 47, 41, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    body.dark .dropdown-menu button { color: #d4e6df; }

    .main-menu {
      display: flex; 
      gap: 4px; 
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px; 
      padding: 4px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .main-menu .menu-wrapper { margin-left: auto; flex-shrink: 0; }
    .main-menu .menu-wrapper .top-btn {
      width: 38px; height: 38px; font-size: 18px;
      background: rgba(255, 255, 255, 0.2);
    }
    .main-menu button.tab-btn {
      flex: 1; min-width: 40px; padding: 10px 4px;
      border: none; border-radius: 30px;
      background: transparent; font-weight: 600; font-size: 11px;
      color: #5a7a6e; cursor: pointer; transition: all 0.3s;
      font-family: 'Montserrat', sans-serif;
    }
    .main-menu button.tab-btn.active { 
      background: rgba(26, 145, 112, 0.15);
      color: #1a9170; 
    }
    body.dark .main-menu {
      background: rgba(30, 47, 41, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    body.dark .main-menu button.tab-btn { color: #8ab0a0; }
    body.dark .main-menu button.tab-btn.active { 
      background: rgba(26, 145, 112, 0.2);
      color: #2dbd94; 
    }

    .fab {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a9170, #23a080);
      color: white;
      border: none;
      font-size: 40px;
      font-weight: 300;
      box-shadow: 0 8px 32px rgba(26, 145, 112, 0.4);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      animation: float 3s ease-in-out infinite;
    }
    .fab:hover { transform: scale(1.08); }
    .fab:active { transform: scale(0.92); }

    .cat-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 12px; margin: 16px 0;
    }
    .cat-item {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px; padding: 12px 4px;
      text-align: center; font-weight: 600; font-size: 12px;
      cursor: pointer;
      text-transform: capitalize;
      transition: all 0.3s;
    }
    .cat-item:hover {
      transform: translateY(-4px);
      background: rgba(26, 145, 112, 0.12);
    }
    body.dark .cat-item {
      background: rgba(30, 47, 41, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .cat-item .icon { font-size: 28px; display: block; margin-bottom: 4px; }

    .dialog-overlay {
      position: fixed; inset:0; 
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center; justify-content: center; z-index: 200;
      padding: 20px;
      animation: fadeSlideUp 0.3s ease;
    }
    .dialog-content {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 32px;
      max-width: 400px; width: 100%; padding: 24px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
      animation: glassAppear 0.4s ease;
    }
    .dialog-content h2 { margin-bottom: 16px; color: #1a9170; font-size: 18px; }
    .dialog-content input, .dialog-content textarea, .dialog-content select {
      width: 100%; padding: 12px 14px; border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 12px; font-size: 14px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      transition: all 0.3s ease;
    }
    .dialog-content input:focus, .dialog-content textarea:focus {
      border-color: #1a9170;
      box-shadow: 0 0 0 3px rgba(26, 145, 112, 0.15);
      outline: none;
    }
    body.dark .dialog-content {
      background: rgba(30, 47, 41, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    body.dark .dialog-content input, body.dark .dialog-content textarea,
    body.dark .dialog-content select {
      background: rgba(42, 64, 56, 0.7);
      border-color: rgba(255, 255, 255, 0.05);
      color: #d4e6df;
    }
    .dialog-content button {
      background: linear-gradient(135deg, #1a9170, #23a080);
      border: none; padding: 12px 20px;
      border-radius: 30px; font-weight: 700; color: white;
      font-size: 14px; cursor: pointer; width: 100%;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.3s ease;
    }
    .dialog-content button:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(26, 145, 112, 0.3);
    }
    .dialog-content .btn-secondary {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #1a2e28; margin-top: 8px;
    }
    body.dark .dialog-content .btn-secondary {
      background: rgba(45, 74, 64, 0.5);
      color: #d4e6df;
    }

    .photo-upload {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .photo-upload input[type="file"] { display: none; }
    .photo-upload label {
      padding: 10px 16px;
      background: rgba(232, 243, 239, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px; font-weight: 600;
      color: #1a4d3d;
      font-family: 'Montserrat', sans-serif;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    .photo-upload label:hover { background: rgba(26, 145, 112, 0.15); }
    body.dark .photo-upload label {
      background: rgba(42, 64, 56, 0.7);
      color: #d4e6df;
      border-color: rgba(255, 255, 255, 0.05);
    }
    .photo-preview {
      max-width: 100px; max-height: 100px;
      border-radius: 12px; object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .photo-clear {
      background: none; border: none;
      color: #e74c3c; cursor: pointer;
      font-size: 18px; padding: 4px 8px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
    }

    .toast {
      position: fixed; bottom: 190px; left: 20px; right: 20px;
      max-width: 400px; margin: 0 auto;
      background: rgba(26, 46, 40, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white; padding: 14px 20px;
      border-radius: 40px; font-weight: 500; text-align: center;
      z-index: 300; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0; transform: translateY(20px) scale(0.95);
      pointer-events: none;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .toast.show { opacity: 1; transform: translateY(0) scale(1); }

    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    
    .ingredient-item, .step-item {
      background: rgba(237, 246, 242, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 8px 12px; border-radius: 30px;
      margin: 4px 0; display: flex; justify-content: space-between;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    body.dark .ingredient-item, body.dark .step-item {
      background: rgba(31, 63, 53, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .timer-display {
      font-size: 4rem; font-weight: 700; text-align: center;
      letter-spacing: 4px; color: #1a9170;
    }
    .timer-controls {
      display: flex; justify-content: center; gap: 16px; margin: 16px 0;
    }
    .timer-controls button {
      background: rgba(26, 145, 112, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 24px;
      border-radius: 40px; font-weight: 700; color: #1a9170;
      cursor: pointer; font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      transition: all 0.3s ease;
    }
    .timer-controls button:hover {
      background: rgba(26, 145, 112, 0.3);
      transform: scale(1.05);
    }

    .settings-panel {
      position: fixed; inset:0; 
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 150;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .settings-panel.open { display: flex; }
    .settings-content {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 32px; max-width: 400px;
      width: 100%; padding: 28px 24px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
      position: relative;
      animation: glassAppear 0.4s ease;
    }
    .settings-content h2 { color: #1a9170; margin-bottom: 20px; font-size: 18px; }
    .settings-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    body.dark .settings-item { border-color: rgba(255, 255, 255, 0.03); }
    .settings-item:last-child { border-bottom: none; }
    .settings-label { font-weight: 600; font-size: 14px; }
    .settings-control { display: flex; gap: 8px; align-items: center; }
    .settings-control select, .settings-control button {
      padding: 6px 14px; border-radius: 20px; 
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; cursor: pointer; font-weight: 500;
      transition: all 0.3s ease;
    }
    .settings-control .btn-primary {
      background: linear-gradient(135deg, #1a9170, #23a080);
      color: white; border: none;
    }
    .settings-control .btn-secondary {
      background: rgba(255, 255, 255, 0.3);
      color: #1a2e28; border: 1px solid rgba(255, 255, 255, 0.2);
    }
    body.dark .settings-content {
      background: rgba(30, 47, 41, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    body.dark .settings-control select, body.dark .settings-control button {
      background: rgba(42, 64, 56, 0.5);
      border-color: rgba(255, 255, 255, 0.05);
      color: #d4e6df;
    }
    body.dark .settings-control .btn-secondary {
      background: rgba(45, 74, 64, 0.5);
      color: #d4e6df;
    }
    .settings-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; font-size: 24px;
      cursor: pointer; color: #5a7a6e;
      transition: transform 0.3s ease;
    }
    .settings-close:hover { transform: rotate(90deg); }

    #searchInput {
      font-family: 'Montserrat', sans-serif;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      padding: 12px 16px;
      width: 100%;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    #searchInput:focus {
      border-color: #1a9170;
      box-shadow: 0 0 0 3px rgba(26, 145, 112, 0.1);
      outline: none;
    }
    body.dark #searchInput {
      background: rgba(30, 47, 41, 0.5);
      border-color: rgba(255, 255, 255, 0.05);
      color: #d4e6df;
    }
    
    .capitalize { text-transform: lowercase; }
    .capitalize::first-letter { text-transform: uppercase; }
    
    .example-text {
      font-size: 12px;
      color: #7a9a8a;
      margin-top: -8px;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    body.dark .example-text { color: #8ab0a0; }
  </style>
</head>
<body>
<div id="app" class="app"></div>
<div id="toast" class="toast"></div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-content">
    <button class="settings-close" id="settingsClose">✕</button>
    <h2>Настройки</h2>
    <div class="settings-item">
      <span class="settings-label">Тема</span>
      <div class="settings-control">
        <select id="themeSelect">
          <option value="light">Светлая</option>
          <option value="dark">Тёмная</option>
          <option value="auto">Авто</option>
        </select>
      </div>
    </div>
    <div class="settings-item">
      <span class="settings-label">Язык</span>
      <div class="settings-control">
        <select id="langSelect">
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
    <div class="settings-item">
      <span class="settings-label">Экспорт QR</span>
      <div class="settings-control">
        <button class="btn-primary" id="qrExportBtn">Экспорт</button>
      </div>
    </div>
    <div class="settings-item">
      <span class="settings-label">Импорт QR</span>
      <div class="settings-control">
        <button class="btn-secondary" id="qrImportBtn">Импорт</button>
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="addRecipeBtn">+</button>

<script>
// ============================================================
// DATA LAYER
// ============================================================
const STORAGE_KEY = 'kokos_data';
const SETTINGS_KEY = 'kokos_settings';
let data = loadData();
let settings = loadSettings();
let currentTab = 'recipes';
let editingId = null;
let timerInterval = null;
let tempPhotoData = null;

function defaultData() {
  return { recipes: [], weekly: { mon:[], tue:[], wed:[], thu:[], fri:[], sat:[], sun:[] } };
}

function loadData() {
  try { 
    const raw = localStorage.getItem(STORAGE_KEY); 
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        return parsed;
      }
    }
    return defaultData(); 
  } 
  catch(e) { 
    console.error('Ошибка загрузки данных:', e);
    return defaultData(); 
  }
}

function saveData() { 
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    console.log('✅ Данные сохранены. Рецептов:', data.recipes ? data.recipes.length : 0);
    return true;
  } catch(e) {
    console.error('❌ Ошибка сохранения:', e);
    toast('Ошибка сохранения!');
    return false;
  }
}

function loadSettings() {
  try { 
    const raw = localStorage.getItem(SETTINGS_KEY); 
    return raw ? JSON.parse(raw) : { theme: 'light', lang: 'ru' }; 
  } 
  catch(e) { return { theme: 'light', lang: 'ru' }; }
}

function saveSettings() { 
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); 
}

function genId() { 
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6); 
}

function toast(msg) { 
  const t = document.getElementById('toast'); 
  if (!t) return;
  t.textContent = msg; 
  t.classList.add('show'); 
  clearTimeout(t._timeout);
  t._timeout = setTimeout(()=>t.classList.remove('show'), 2500); 
}

function capitalize(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// RECIPES
// ============================================================
function renderRecipes() {
  const all = data.recipes || [];
  const recent = [...all].sort((a,b)=> (b.date||'').localeCompare(a.date||'')).slice(0,3);
  const popular = [...all].sort((a,b)=> (b.counter||0)-(a.counter||0)).slice(0,3);
  const cats = ['завтраки','супы','салаты','горячее','выпечка','десерты','напитки','закуски'];
  const icons = ['🍳','🥣','🥗','🍖','🥐','🍰','🥤','🍢'];
  
  let html = `
    <div style="margin-bottom:12px;">
      <input id="searchInput" placeholder="Поиск по названию, ингредиентам...">
    </div>
    <div class="cat-grid">
      ${cats.map((c,i)=>`<div class="cat-item" data-cat="${c}"><span class="icon">${icons[i]}</span>${capitalize(c)}</div>`).join('')}
    </div>
    <h3>Недавно добавленные</h3>
    ${recent.length ? recent.map(r=>recipeCard(r)).join('') : '<p class="card">Нет рецептов</p>'}

    ${all.length ? all.map(r=>recipeCard(r)).join('') : '<p class="card">Добавьте первый рецепт</p>'}
  `;
  return html;
}

function recipeCard(r) {
  const isFav = r.favorite || false;
  return `<div class="card" data-id="${r.id}">
    <div class="flex-between">
      <span class="card-title">${r.name || 'Без названия'}</span>
      <span class="star ${isFav?'active':''}" data-id="${r.id}">${isFav?'★':'☆'}</span>
    </div>
    <div class="card-sub">
      <span>${r.category ? capitalize(r.category) : ''}</span>
      <span>⏱ ${r.time || ''}</span>
      <span>${r.difficulty ? capitalize(r.difficulty) : ''}</span>
    </div>
    ${r.photo ? `<img src="${r.photo}" alt="photo">` : ''}
    <div class="flex-row" style="margin-top:8px;">
      <button class="chip" data-action="view" data-id="${r.id}">Детали</button>

// ============================================================
function renderPlanner() {
  const days = ['mon','tue','wed','thu','fri','sat','sun'];
  const dayLabels = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let html = `<h2>Планировщик недели</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">`;
  days.forEach((d,i)=> {
    const ids = data.weekly ? data.weekly[d] || [] : [];
    const names = ids.map(id=>{ const rec = data.recipes.find(r=>r.id===id); return rec ? rec.name : '?'; }).join(', ');
    html += `<div class="card" style="padding:10px;">
      <strong style="font-size:13px;">${dayLabels[i]}</strong><br>
      <span style="font-size:13px;">${names || '—'}</span>
      <div style="margin-top:6px;">
        <button class="chip" data-action="addToDay" data-day="${d}">+</button>
        <button class="chip" data-action="clearDay" data-day="${d}">✕</button>
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ============================================================
// SHOPPING
// ============================================================
function renderShopping() {
  const allIds = data.weekly ? Object.values(data.weekly).flat() : [];
  const ingMap = {};
  allIds.forEach(id=>{
    const rec = data.recipes.find(r=>r.id===id);
    if(!rec) return;
    (rec.ingredients || []).forEach(ing=>{
      const key = ing.name ? ing.name.toLowerCase() : 'unknown';
      if(!ingMap[key]) ingMap[key] = { name: ing.name || 'unknown', amount: 0, unit: ing.unit || '' };
      ingMap[key].amount += parseFloat(ing.amount) || 0;
    });
  });
  let html = `<h2>Список покупок</h2><div>`;
  if(Object.keys(ingMap).length === 0) {
    html += `<p class="card">Нет запланированных рецептов</p>`;
  } else {
    html += Object.values(ingMap).map(ing=>`
      <div class="ingredient-item"><span>${capitalize(ing.name)} ${ing.amount} ${ing.unit}</span><span>✓</span></div>
    `).join('');
  }
  html += `</div>`;
  return html;
}

// ============================================================
// EVENTS
// ============================================================
function attachEvents() {
  // Main menu tabs
  document.querySelectorAll('.main-menu button.tab-btn[data-tab]').forEach(btn=>{
    btn.onclick = ()=> { currentTab = btn.dataset.tab; render(); };
  });
  
  // Dropdown menu
  document.getElementById('menuToggle')?.addEventListener('click', (e)=> {
    document.getElementById('dropdownMenu').classList.toggle('open');
    e.stopPropagation();
  });
  document.addEventListener('click', ()=> document.getElementById('dropdownMenu')?.classList.remove('open'));
  
  document.querySelectorAll('#dropdownMenu button[data-action]').forEach(btn=>{
    btn.onclick = (e)=> { 
      const action = e.target.dataset.action;
      if(action === 'converter') showConverter();
      else if(action === 'favorites') { currentTab='recipes'; render(); filterFavorites(); }
      else if(action === 'random') randomRecipe();
      document.getElementById('dropdownMenu').classList.remove('open');
    };
  });
  
  // Settings button
  document.getElementById('settingsBtn')?.addEventListener('click', ()=> {
    document.getElementById('settingsPanel').classList.add('open');
    document.getElementById('themeSelect').value = settings.theme;
    document.getElementById('langSelect').value = settings.lang;
  });
  
  // FAB - Add recipe
  document.getElementById('addRecipeBtn')?.addEventListener('click', ()=> showRecipeDialog());
  
  // Settings
  document.getElementById('settingsClose')?.addEventListener('click', ()=> {
    document.getElementById('settingsPanel').classList.remove('open');
  });
  document.getElementById('settingsPanel')?.addEventListener('click', (e)=> {
    if(e.target === e.currentTarget) document.getElementById('settingsPanel').classList.remove('open');
  });
  
  document.getElementById('themeSelect')?.addEventListener('change', function() {
    settings.theme = this.value;
    saveSettings();
    applyTheme();
    toast('Тема обновлена');
  });
  
  document.getElementById('langSelect')?.addEventListener('change', function() {
    settings.lang = this.value;
    saveSettings();
    render();
    toast('Язык изменён');
  });
  
  document.getElementById('qrExportBtn')?.addEventListener('click', exportQR);
  document.getElementById('qrImportBtn')?.addEventListener('click', importQR);
  
  // Search
  document.getElementById('searchInput')?.addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.card[data-id]').forEach(card=>{
      const rec = data.recipes.find(r=>r.id===card.dataset.id);
      if(!rec) return;
      const match = (rec.name || '').toLowerCase().includes(q) || 
        (rec.ingredients || []).some(i=> (i.name || '').toLowerCase().includes(q)) || 
        (rec.category || '').toLowerCase().includes(q);
      card.style.display = match ? '' : 'none';
    });
  });
  
  // Category filter
  document.querySelectorAll('.cat-item').forEach(el=>{
    el.onclick = ()=> {
      const cat = el.dataset.cat;
      document.querySelectorAll('.card[data-id]').forEach(card=>{
        const rec = data.recipes.find(r=>r.id===card.dataset.id);
        card.style.display = rec && rec.category === cat ? '' : 'none';
      });
    };
  });
  
  // Card actions
  document.querySelector('#pageContent')?.addEventListener('click', function(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    
    const action = target.dataset.action;
    const id = target.dataset.id;
    
    if (action === 'view') showRecipeDetail(id);
    else if (action === 'edit') showRecipeDialog(id);
    else if (action === 'delete') {
      if(confirm('Удалить рецепт?')) { 
        data.recipes = data.recipes.filter(r=>r.id!==id); 
        saveData(); 
        render(); 
        toast('Удалено'); 
      }
    }
    else if (action === 'share') shareRecipe(id);
  });
  
  // Star clicks
  document.querySelector('#pageContent')?.addEventListener('click', function(e) {
    const target = e.target.closest('.star');
    if (!target) return;
    const id = target.dataset.id;
    const rec = data.recipes.find(r=>r.id===id);
    if(rec) { 
      rec.favorite = !rec.favorite; 
      saveData(); 
      render(); 
    }
  });
  
  // Planner
  document.querySelector('#pageContent')?.addEventListener('click', function(e) {
    const target = e.target.closest('[data-action="addToDay"]');
    if (target) {
      const day = target.dataset.day;
      if(!data.recipes || !data.recipes.length) return toast('Нет рецептов');
      showSelectRecipe(day);
    }
  });
  
  document.querySelector('#pageContent')?.addEventListener('click', function(e) {
    const target = e.target.closest('[data-action="clearDay"]');
    if (target) {
      const day = target.dataset.day;
      if (data.weekly) {
        data.weekly[day] = []; 
        saveData(); 
        render(); 
        toast('День очищен');
      }
    }
  });
  
  // Timer
  document.getElementById('timerStart')?.addEventListener('click', startTimer);
  document.getElementById('timerStop')?.addEventListener('click', stopTimer);
  document.getElementById('timerReset')?.addEventListener('click', resetTimer);
  document.getElementById('timerSet')?.addEventListener('click', ()=>{
    const min = parseInt(document.getElementById('timerMin').value)||0;
    const sec = parseInt(document.getElementById('timerSec').value)||0;
    const total = min*60+sec;
    if(total>0) { timerSeconds = total; updateTimerDisplay(); toast('Таймер установлен'); }
  });
}

// ============================================================
// THEME
// ============================================================
function applyTheme() {
  if (settings.theme === 'dark' || (settings.theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.classList.add('dark');
  } else {
    document.body.classList.remove('dark');
  }
}

// ============================================================
// DIALOGS
// ============================================================
function showRecipeDialog(id=null) {
  const rec = id ? data.recipes.find(r=>r.id===id) : null;
  editingId = id;
  tempPhotoData = rec ? rec.photo : null;
  
  const html = `
    <div class="dialog-overlay" id="dialogOverlay">
      <div class="dialog-content">
        <h2>${rec ? 'Редактировать рецепт' : 'Новый рецепт'}</h2>
        
        <input id="dName" placeholder="Название рецепта" value="${rec ? (rec.name || '') : ''}">
        
        <select id="dCategory">
          <option value="">Выберите категорию</option>
          ${['завтраки','супы','салаты','горячее','выпечка','десерты','напитки','закуски'].map(c=>`<option value="${c}" ${rec && rec.category===c ? 'selected' : ''}>${capitalize(c)}</option>`).join('')}
        </select>
        
        <input id="dTime" placeholder="Время приготовления (например: 30 мин)" value="${rec ? (rec.time || '') : ''}">
        
        <select id="dDifficulty">
          <option value="легко" ${rec && rec.difficulty==='легко' ? 'selected' : ''}>Легко</option>
          <option value="средне" ${rec && rec.difficulty==='средне' ? 'selected' : ''}>Средне</option>
          <option value="сложно" ${rec && rec.difficulty==='сложно' ? 'selected' : ''}>Сложно</option>
        </select>
        
        <textarea id="dIngredients" placeholder="Ингредиенты (каждый с новой строки)&#10;Пример:&#10;Мука 200 г&#10;Сахар 100 г&#10;Яйца 3 шт">${rec ? (rec.ingredients || []).map(i=>`${i.name || ''} ${i.amount || ''} ${i.unit || ''}`).join('\n') : ''}</textarea>
        <div class="example-text">Формат: Название Количество Единица (например: Мука 200 г)</div>
        
        <textarea id="dSteps" placeholder="Шаги приготовления (каждый с новой строки)">${rec ? (rec.steps || []).join('\n') : ''}</textarea>
        
        <div class="photo-upload">
          <label for="photoInput">📷 Выбрать фото</label>
          <input type="file" id="photoInput" accept="image/*">
          ${tempPhotoData ? `<img src="${tempPhotoData}" class="photo-preview" id="photoPreview"><button class="photo-clear" id="photoClear">✕</button>` : '<div id="photoPreviewContainer"></div>'}
        </div>
        
        <button id="dSave">Сохранить рецепт</button>
        <button class="btn-secondary" id="dCancel">Отмена</button>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
  
  // Photo upload handler
  document.getElementById('photoInput')?.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
      tempPhotoData = event.target.result;
      const container = document.getElementById('photoPreviewContainer') || document.getElementById('photoPreview')?.parentNode;
      if (container) {
        const existingImg = container.querySelector('.photo-preview');
        if (existingImg) existingImg.remove();
        const img = document.createElement('img');
        img.src = tempPhotoData;
        img.className = 'photo-preview';
        img.id = 'photoPreview';
        container.appendChild(img);
        const clearBtn = document.createElement('button');
        clearBtn.className = 'photo-clear';
        clearBtn.textContent = '✕';
        clearBtn.id = 'photoClear';
        container.appendChild(clearBtn);
        document.getElementById('photoClear')?.addEventListener('click', function() {
          tempPhotoData = null;
          const img = document.getElementById('photoPreview');
          if (img) img.remove();
          this.remove();
        });
      }
    };
    reader.readAsDataURL(file);
  });
  
  // Photo clear handler
  document.getElementById('photoClear')?.addEventListener('click', function() {
    tempPhotoData = null;
    const img = document.getElementById('photoPreview');
    if (img) img.remove();
    this.remove();
  });
  
  document.getElementById('dSave').onclick = ()=>{
    const name = document.getElementById('dName').value.trim();
    if(!name) {
      toast('❌ Введите название рецепта');
      return;
    }
    
    const category = document.getElementById('dCategory').value;
    const time = document.getElementById('dTime').value.trim();
    const difficulty = document.getElementById('dDifficulty').value;
    
    // Парсим ингредиенты
    const ingText = document.getElementById('dIngredients').value;
    const ingredients = [];
    if (ingText.trim()) {
      ingText.split('\n').filter(l=>l.trim()).forEach(line => {
        const parts = line.trim().split(' ');
        // Ищем последнее слово - это может быть единица измерения
        let unit = '';
        let amount = '';
        let nameParts = [];
        
        // Проверяем, есть ли в конце единица измерения
        const lastWord = parts[parts.length - 1];
        const units = ['г','кг','мл','л','шт','ст.л','ч.л','стакан','стакана','стаканов','кусок','куска','зубчик','зубчика','щепотка','щепотки'];
        if (units.some(u => lastWord.toLowerCase().includes(u))) {
          unit = lastWord;
          // Предпоследнее слово - это количество
          if (parts.length >= 2) {
            amount = parts[parts.length - 2];
            nameParts = parts.slice(0, parts.length - 2);
          } else {
            nameParts = parts.slice(0, parts.length - 1);
          }
        } else {
          // Если единицы нет, пробуем найти число в конце
          const lastWordIsNumber = !isNaN(parseFloat(lastWord));
          if (lastWordIsNumber && parts.length >= 2) {
            amount = lastWord;
            nameParts = parts.slice(0, parts.length - 1);
          } else {
            nameParts = parts;
          }
        }
        
        const nameFinal = nameParts.join(' ') || line;
        ingredients.push({ 
          name: nameFinal, 
          amount: amount || '1', 
          unit: unit || '' 
        });
      });
    }
    
    const steps = document.getElementById('dSteps').value.split('\n').filter(l=>l.trim());
    const photo = tempPhotoData || '';
    
    if (ingredients.length === 0 && !rec) {
      toast('❌ Добавьте хотя бы один ингредиент');
      return;
    }
    
    if(rec) {
      // Обновляем существующий рецепт
      rec.name = name;
      rec.category = category;
      rec.time = time;
      rec.difficulty = difficulty;
      rec.ingredients = ingredients;
      rec.steps = steps;
      rec.photo = photo;
      toast('✅ Рецепт обновлён');
    } else {
      // Создаём новый рецепт
      const newRecipe = { 
        id: genId(), 
        name, 
        category, 
        time, 
        difficulty, 
        ingredients, 
        steps, 
        photo, 
        favorite: false, 
        date: new Date().toISOString(), 
        counter: 0 
      };
      data.recipes.push(newRecipe);
      toast('✅ Рецепт добавлен!');
      console.log('📝 Новый рецепт:', newRecipe);
    }
    
    saveData();
    render(); 
    document.getElementById('dialogOverlay')?.remove();
  };
  
  document.getElementById('dCancel').onclick = ()=> document.getElementById('dialogOverlay')?.remove();
  document.getElementById('dialogOverlay').onclick = (e)=> { 
    if(e.target === e.currentTarget) e.target.remove(); 
  };
}

    btn.onclick = ()=> {
      if(!data.weekly) data.weekly = { mon:[], tue:[], wed:[], thu:[], fri:[], sat:[], sun:[] };
      if(!data.weekly[day]) data.weekly[day] = [];
      if(!data.weekly[day].includes(btn.dataset.id)) {
        data.weekly[day].push(btn.dataset.id);
        const rec = data.recipes.find(r=>r.id===btn.dataset.id);
        if(rec) rec.counter = (rec.counter||0)+1;
        saveData(); 
        render(); 
        toast('✅ Добавлен в план');
      } else toast('Уже есть');
      document.getElementById('selectOverlay')?.remove();
    };
  });
  document.getElementById('closeSelect').onclick = ()=> document.getElementById('selectOverlay')?.remove();
}

function shareRecipe(id) {
  const rec = data.recipes.find(r=>r.id===id);
  if(!rec) return;
  const text = `${rec.name || 'Без названия'}\n${rec.category ? capitalize(rec.category) : ''} | ${rec.time || ''}\nИнгредиенты: ${(rec.ingredients || []).map(i=>`${i.name || ''} ${i.amount || ''} ${i.unit || ''}`).join(', ')}\nШаги: ${(rec.steps || []).join('; ')}`;
  navigator.clipboard.writeText(text).then(()=>toast('✅ Скопировано')).catch(()=>toast('Ошибка копирования'));
}

function filterFavorites() {
  document.querySelectorAll('.card[data-id]').forEach(card=>{
    const rec = data.recipes.find(r=>r.id===card.dataset.id);
    card.style.display = rec && rec.favorite ? '' : 'none';
  });
}

function randomRecipe() {
  if(!data.recipes || !data.recipes.length) return toast('Нет рецептов');
  const r = data.recipes[Math.floor(Math.random()*data.recipes.length)];
  showRecipeDetail(r.id);
}

// ============================================================
// TIMER LOGIC
// ============================================================
let timerSeconds = 0;
function updateTimerDisplay() {
  const m = Math.floor(timerSeconds/60);
  const s = timerSeconds%60;
  const el = document.getElementById('timerDisplay');
  if (el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function startTimer() {
  if(timerInterval) return;
  if(timerSeconds<=0) { toast('Установите время'); return; }
  timerInterval = setInterval(()=>{ 
    timerSeconds--; 
    updateTimerDisplay(); 
    if(timerSeconds<=0){ clearInterval(timerInterval); timerInterval=null; toast('⏰ Время вышло!'); } 
  },1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval=null; }
function resetTimer() { stopTimer(); timerSeconds=0; updateTimerDisplay(); }

// ============================================================
// CONVERTER
// ============================================================
function showConverter() {
  const html = `<div class="dialog-overlay" id="convOverlay"><div class="dialog-content"><h2>Конвертер мер</h2>
    <input id="convVal" placeholder="Количество" type="number" value="1">
    <select id="convFrom">
      <option value="g">Граммы</option>
      <option value="ml">Миллилитры</option>
      <option value="cup">Стаканы</option>
      <option value="tbsp">Ст. ложки</option>
      <option value="tsp">Ч. ложки</option>
      <option value="pcs">Штуки</option>
    </select>
    <select id="convTo">
      <option value="g">Граммы</option>
      <option value="ml">Миллилитры</option>
      <option value="cup">Стаканы</option>
      <option value="tbsp">Ст. ложки</option>
      <option value="tsp">Ч. ложки</option>
      <option value="pcs">Штуки</option>
    </select>
    <button id="convCalc">Рассчитать</button>
    <p id="convResult" style="text-align:center;margin:12px 0;font-weight:700;"></p>
    <button class="btn-secondary" id="convClose">Закрыть</button>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  
  document.getElementById('convCalc').onclick = ()=>{
    const val = parseFloat(document.getElementById('convVal').value)||0;
    const from = document.getElementById('convFrom').value;
    const to = document.getElementById('convTo').value;
    const units = { g:1, ml:1, cup:240, tbsp:15, tsp:5, pcs:1 };
    const result = val * (units[from]/units[to]);
    document.getElementById('convResult').textContent = `${val} → ${result.toFixed(2)}`;
  };
  document.getElementById('convClose').onclick = ()=> document.getElementById('convOverlay')?.remove();
  document.getElementById('convOverlay').onclick = (e)=> { if(e.target===e.currentTarget) e.target.remove(); };
}

// ============================================================
// QR
// ============================================================
function exportQR() {
  const json = JSON.stringify(data);
  const url = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(json)}`;
  const html = `<div class="dialog-overlay" id="qrOverlay"><div class="dialog-content"><h2>QR код</h2><img src="${url}" style="width:100%;border-radius:16px;"><button id="qrClose">Закрыть</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('qrClose').onclick = ()=> document.getElementById('qrOverlay')?.remove();
}

function importQR() {
  const html = `<div class="dialog-overlay" id="importOverlay"><div class="dialog-content"><h2>Импорт из QR</h2><textarea id="qrData" placeholder='{"recipes":[...]}' style="height:120px;"></textarea><button id="qrImport">Импорт</button><button class="btn-secondary" id="qrImportCancel">Отмена</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('qrImport').onclick = ()=>{
    try { 
      const d = JSON.parse(document.getElementById('qrData').value); 
      data = d; 
      saveData(); 
      render(); 
      toast('✅ Импорт успешен'); 
    } catch(e){ toast('❌ Ошибка формата'); }
    document.getElementById('importOverlay')?.remove();
  };
  document.getElementById('qrImportCancel').onclick = ()=> document.getElementById('importOverlay')?.remove();
}
